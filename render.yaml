# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub, then on Render choose "New +" -> "Blueprint"
# and point it at this repository. Render reads this file automatically.
services:
  - type: web
    name: wc2026predictor
    runtime: python
    plan: free
    # Build deps AND pre-build the model so the running process just loads the
    # cached artifact (much lower memory than training in-process). The dataset
    # is downloaded during the build, which has network access.
    buildCommand: "pip install -r requirements.txt && python -m backend.train"
    startCommand: "uvicorn backend.app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
